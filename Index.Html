            // Function to generate a random CAPTCHA
            function generateCaptcha() {
                let captcha = Math.floor(1000 + Math.random() * 9000); // Generate 4-digit random number
                document.getElementById("generatedCaptcha").innerText = captcha;
                document.getElementById("generatedCaptcha").dataset.value = captcha; // Store for validation
            }

            // Function to validate CAPTCHA before form submission
            function validateCaptcha() {

                let rc = document.getElementById("mobile").value;
                let rn = document.getElementById("password").value;
                let userCaptcha = document.getElementById("captchaInput").value;
                let generatedCaptcha = document.getElementById("generatedCaptcha").dataset.value;

                if (rc ==="") {
                    document.getElementById("RequiredFieldValidator1").style.visibility = "visible";
                    return false; // Prevent form submission
                }
                else if (rn === "") {
                    document.getElementById("RequiredFieldValidator2").style.visibility = "visible";
                    return false; // Prevent form submission
                }
                else if (userCaptcha === "") {
                    document.getElementById("RequiredFieldValidator3").style.visibility = "visible";
                    return false; // Prevent form submission
                }
                else if (userCaptcha !== generatedCaptcha) {
                    document.getElementById("captchaError").style.visibility = "visible";
                    return false; // Prevent form submission
                } else {
                    document.getElementById("captchaError").style.visibility = "hidden";
                    return true;
                }
            }

            // Attach validation to form submit event
            document.getElementById("form1").onsubmit = function () {
                return validateCaptcha();
            };

            // Generate CAPTCHA on page load
            window.onload = function () {
                generateCaptcha();
            };
        </script>

        function submitWithQueryString() {
            debugger;
            // Get values
            let rollCode = document.getElementById("Rollcode").value.trim();
            let rollNo = document.getElementById("Rollnumber").value.trim();
            let userCaptcha = document.getElementById("captchaInput").value.trim();
            let generatedCaptcha = document.getElementById("generatedCaptcha").dataset.value;

            // Validations
            if (rollCode === "") {
                document.getElementById("RequiredFieldValidator1").style.visibility = "visible";
                return;
            }

            if (rollNo === "") {
                document.getElementById("RequiredFieldValidator2").style.visibility = "visible";
                return;
            }

            if (userCaptcha === "") {
                document.getElementById("RequiredFieldValidator3").style.visibility = "visible";
                return;
            }

            if (userCaptcha !== generatedCaptcha) {
                document.getElementById("captchaError").style.visibility = "visible";
                return;
            }

            // Hide errors
            document.getElementById("captchaError").style.visibility = "hidden";

            // Build query string
            let url = "InterResult.aspx"
                + "?Rollcode=" + encodeURIComponent(rollCode)
                + "&Rollnumber=" + encodeURIComponent(rollNo);

            // Redirect
            window.location.href = url;
        }
        //]]>
